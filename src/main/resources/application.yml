server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: ms-tienda
  datasource:

    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://host.docker.internal:3307/db_gym_tienda?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: root

    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:

      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:TXV5TGdyYVNlZ3VyYVBhcmFHeW1TeW5jMjAyNkNvbnRyYXNlbmE=}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://host.docker.internal:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html